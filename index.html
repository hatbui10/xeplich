<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sơ Đồ Lớp Học - Nút Gọi Nổi Bật</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            margin: 0;
            padding: 10px;
            color: #cbd5e1;
        }
        h2 {
            text-align: center;
            color: #f8fafc;
            margin: 15px 0;
            text-transform: uppercase;
            font-size: 20px;
        }
        
        /* BỘ CÔNG CỤ XẾP LỊCH */
        .admin-panel {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 15px;
            max-width: 1300px;
            margin: 0 auto 20px auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .admin-title {
            font-size: 14px;
            font-weight: bold;
            color: #3b82f6;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            align-items: flex-end;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group label {
            font-size: 12px;
            color: #94a3b8;
        }
        .form-group select, .form-group input {
            background-color: #0f172a;
            border: 1px solid #475569;
            color: #f8fafc;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-submit {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            width: 100%;
        }
        .btn-submit:hover { background-color: #2563eb; }

        /* THANH CHỌN THỨ */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 8px 14px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid #334155;
            background-color: #1e293b;
            color: #94a3b8;
            cursor: pointer;
            border-radius: 6px;
        }
        .tab-btn.active {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
        }

        /* KHU VỰC HIỂN THỊ SƠ ĐỒ TOÀ NHÀ */
        .content-container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .building-block {
            background-color: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
            padding: 15px;
        }
        .building-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #334155;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .dot-A { background-color: #ef4444; }
        .dot-B { background-color: #fbbf24; }
        .dot-C { background-color: #10b981; }
        .dot-D { background-color: #a78bfa; }

        .floor-row {
            display: flex;
            flex-direction: column;
            border-bottom: 1px dashed #334155;
            padding: 12px 0;
            align-items: flex-start;
            gap: 8px;
        }
        .floor-row:last-child { border-bottom: none; }
        
        .floor-label {
            font-weight: bold;
            color: #3b82f6;
            font-size: 15px;
        }
        
        .floor-classes {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            width: 100%;
        }

        /* THỂ LỚP HỌC */
        .class-card {
            background: #0f172a;
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #475569;
            position: relative;
            box-sizing: border-box;
            width: 100%;
        }
        .btn-delete {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }
        .card-time { font-size: 11px; color: #3b82f6; font-weight: bold; margin-bottom: 4px; }
        .card-title { font-size: 15px; color: #f8fafc; font-weight: bold; margin-bottom: 6px; padding-right: 25px; }
        
        .card-info { 
            font-size: 12px; 
            color: #94a3b8; 
            margin-bottom: 8px; 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
        }

        /* THIẾT KẾ NÚT GỌI RÕ RÀNG NỔI BẬT */
        .btn-call-prominent { 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background-color: #059669; /* Xanh lá đậm nổi bật */
            color: white !important;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            padding: 8px 14px;
            border-radius: 6px;
            box-shadow: 0 2px 4px rgba(5, 150, 105, 0.3);
            transition: background 0.2s;
            width: fit-content;
            margin-top: 2px;
        }
        .btn-call-prominent:hover {
            background-color: #10b981;
        }
        
        .card-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .badge-room { font-size: 11px; color: #06b6d4; background: rgba(6, 182, 212, 0.1); padding: 4px 8px; border-radius: 4px; font-weight: bold; border: 1px solid rgba(6, 182, 212, 0.2); }
        .badge-student { font-size: 11px; color: #e2e8f0; background: #334155; padding: 4px 8px; border-radius: 4px; }
        
        .empty-floor { color: #475569; font-style: italic; font-size: 12px; }

        @media (min-width: 768px) {
            body { padding: 20px; }
            h2 { font-size: 24px; }
            .floor-row { flex-direction: row; align-items: center; gap: 0; }
            .floor-label { width: 100px; flex-shrink: 0; }
            .floor-classes { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
            .tab-btn { padding: 12px 24px; font-size: 15px; border-radius: 8px; }
        }
    </style>
</head>
<body>

    <h2>SƠ ĐỒ PHÂN TẦNG LỚP HỌC</h2>

    <div class="admin-panel">
        <div class="admin-title">🛠 Xếp lịch & phân tầng trực quan</div>
        <div class="form-grid">
            <div class="form-group">
                <label>Chọn Thứ</label>
                <select id="select-day">
                    <option value="thu2">Thứ 2</option><option value="thu3">Thứ 3</option><option value="thu4">Thứ 4</option>
                    <option value="thu5">Thứ 5</option><option value="thu6">Thứ 6</option><option value="thu7">Thứ 7</option><option value="cn">Chủ Nhật</option>
                </select>
            </div>
            <div class="form-group">
                <label>Ca Học</label>
                <select id="select-time">
                    <option value="18h00 - 19h30">Ca 18h00 - 19h30</option>
                    <option value="19h45 - 21h15">Ca 19h45 - 21h15</option>
                    <option value="08h00 - 09h30">Ca 08h00 - 09h30</option>
                </select>
            </div>
            <div class="form-group">
                <label>Lớp Học</label>
                <select id="select-class"></select>
            </div>
            <div class="form-group">
                <label>Sĩ số lớp</label>
                <input type="number" id="input-size" min="1" value="30">
            </div>
            <div class="form-group">
                <label>Giáo Viên</label>
                <select id="select-teacher"></select>
            </div>
            <div class="form-group">
                <label>Toà Nhà</label>
                <select id="select-building" onchange="updateFloorDropdown()">
                    <option value="A">Toà A</option><option value="B">Toà B</option><option value="C">Toà C</option><option value="D">Toà D</option>
                </select>
            </div>
            <div class="form-group">
                <label>Tầng</label>
                <select id="select-floor"></select>
            </div>
            <div class="form-group">
                <label>Số Phòng</label>
                <select id="select-room"></select>
            </div>
            <div class="form-group">
                <button class="btn-submit" onclick="addSchedule()">➕ Xếp Lịch</button>
            </div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="changeDay('thu2', this)">Thứ 2</button>
        <button class="tab-btn" onclick="changeDay('thu3', this)">Thứ 3</button>
        <button class="tab-btn" onclick="changeDay('thu4', this)">Thứ 4</button>
        <button class="tab-btn" onclick="changeDay('thu5', this)">Thứ 5</button>
        <button class="tab-btn" onclick="changeDay('thu6', this)">Thứ 6</button>
        <button class="tab-btn" onclick="changeDay('thu7', this)">Thứ 7</button>
        <button class="tab-btn" onclick="changeDay('cn', this)">Chủ Nhật</button>
    </div>

    <div class="content-container" id="building-container"></div>

    <script>
        const danhSachGiaoVien = [
            { name: "Nguyễn Văn Anh", phone: "0901234567" },
            { name: "Trần Thị Bình", phone: "0911222333" },
            { name: "Lê Hoàng Cường", phone: "0988777666" }
        ];
        const danhSachLop = ["Lớp Tiếng Anh Giao Tiếp A1", "Lớp Toán Tư Duy B3", "Lớp Lập Trình Python C2"];
        const danhSachPhong = ["Phòng 01", "Phòng 02", "Phòng 03", "Phòng 04"];
        
        const cauTrucToaNha = { "A": 2, "B": 3, "C": 4, "D": 6 };

        const defaultSchedule = { thu2: [], thu3: [], thu4: [], thu5: [], thu6: [], thu7: [], cn: [] };
        let lichHocToanTruong = JSON.parse(localStorage.getItem('lichHocTang_V3')) || defaultSchedule;
        let currentDay = 'thu2';

        function updateFloorDropdown() {
            const building = document.getElementById('select-building').value;
            const floorSelect = document.getElementById('select-floor');
            floorSelect.innerHTML = '';
            for(let i = 1; i <= cauTrucToaNha[building]; i++) {
                floorSelect.innerHTML += `<option value="${i}">Tầng ${i}</option>`;
            }
        }

        function initDropdowns() {
            const classSelect = document.getElementById('select-class');
            const teacherSelect = document.getElementById('select-teacher');
            const roomSelect = document.getElementById('select-room');

            danhSachLop.forEach(lop => classSelect.innerHTML += `<option value="${lop}">${lop}</option>`);
            danhSachGiaoVien.forEach(gv => teacherSelect.innerHTML += `<option value="${gv.name}" data-phone="${gv.phone}">${gv.name}</option>`);
            danhSachPhong.forEach(phong => roomSelect.innerHTML += `<option value="${phong}">${phong}</option>`);
            updateFloorDropdown();
        }

        function renderBuildingMap(day) {
            const container = document.getElementById('building-container');
            container.innerHTML = '';

            const listClasses = lichHocToanTruong[day] || [];

            Object.keys(cauTrucToaNha).forEach(toa => {
                let buildingHTML = `
                    <div class="building-block">
                        <div class="building-header"><span class="dot dot-${toa}"></span> TOÀ NHÀ ${toa}</div>
                `;

                const tongSoTang = cauTrucToaNha[toa];
                for (let tang = tongSoTang; tang >= 1; tang--) {
                    buildingHTML += `
                        <div class="floor-row">
                            <div class="floor-label">Tầng ${tang}</div>
                            <div class="floor-classes" id="classes-${toa}-${tang}">
                    `;

                    const lopTrongTang = listClasses.filter(c => c.building === toa && parseInt(c.floor) === tang);

                    if (lopTrongTang.length === 0) {
                        buildingHTML += `<span class="empty-floor">Trống lịch học...</span>`;
                    } else {
                        lopTrongTang.forEach(item => {
                            const originIndex = listClasses.findIndex(c => c === item);
                            const phoneDisplay = item.gvPhone ? item.gvPhone.replace(/(\d{4})(\d{3})(\d{3})/, "$1.$2.$3") : "";
                            
                            buildingHTML += `
                                <div class="class-card">
                                    <button class="btn-delete" onclick="deleteCard('${day}', ${originIndex})">✕</button>
                                    <div class="card-time">⏱ Ca: ${item.time}</div>
                                    <div class="card-title">${item.lopName}</div>
                                    <div class="card-info">
                                        <span>👤 GV: ${item.gvName}</span>
                                        <a href="tel:${item.gvPhone}" class="btn-call-prominent">📞 Gọi ngay: ${phoneDisplay}</a>
                                    </div>
                                    <div class="card-meta">
                                        <span class="badge-room">🚪 ${item.phongName}</span>
                                        <span class="badge-student">👥 Sĩ số: ${item.studentSize}</span>
                                    </div>
                                </div>
                            `;
                        });
                    }

                    buildingHTML += `</div></div>`;
                }

                buildingHTML += `</div>`;
                container.innerHTML += buildingHTML;
            });
        }

        function addSchedule() {
            const targetDay = document.getElementById('select-day').value;
            const time = document.getElementById('select-time').value;
            const lopName = document.getElementById('select-class').value;
            const studentSize = document.getElementById('input-size').value || "0";
            
            const teacherSelect = document.getElementById('select-teacher');
            const gvName = teacherSelect.value;
            const gvPhone = teacherSelect.options[teacherSelect.selectedIndex].getAttribute('data-phone');
            
            const building = document.getElementById('select-building').value;
            const floor = document.getElementById('select-floor').value;
            const phongName = document.getElementById('select-room').value;

            lichHocToanTruong[targetDay].push({ time, lopName, studentSize, gvName, gvPhone, building, floor, phongName });

            localStorage.setItem('lichHocTang_V3', JSON.stringify(lichHocToanTruong));
            renderBuildingMap(currentDay);
            alert("Đã xếp lịch thành công!");
        }

        function deleteCard(day, index) {
            if (confirm("Bạn muốn xóa lớp học này?")) {
                lichHocToanTruong[day].splice(index, 1);
                localStorage.setItem('lichHocTang_V3', JSON.stringify(lichHocToanTruong));
                renderBuildingMap(day);
            }
        }

        function changeDay(dayId, buttonEl) {
            currentDay = dayId;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            buttonEl.classList.add('active');
            renderBuildingMap(dayId);
        }

        window.onload = function() {
            initDropdowns();
            renderBuildingMap('thu2');
        };
    </script>
</body>
    </html>
