<!DOCTYPE html>   
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sơ Đồ Phân Tầng Lớp Học - Hệ Thống Quản Lý</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            margin: 0;
            padding: 10px;
            color: #cbd5e1;
        }
        h2 {
            text-align: center;
            color: #f8fafc;
            margin: 15px 0;
            text-transform: uppercase;
            font-size: 20px;
        }
        
        /* BỘ CÔNG CỤ XẾP LỊCH */
        .admin-panel {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 15px;
            max-width: 1300px;
            margin: 0 auto 20px auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .admin-title {
            font-size: 14px;
            font-weight: bold;
            color: #3b82f6;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            align-items: flex-end;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group label {
            font-size: 12px;
            color: #94a3b8;
        }
        .form-group select, .form-group input {
            background-color: #0f172a;
            border: 1px solid #475569;
            color: #f8fafc;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-submit {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            width: 100%;
        }
        .btn-submit:hover { background-color: #2563eb; }
        
        .btn-clear-day {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            width: 100%;
        }
        .btn-clear-day:hover { background-color: #dc2626; }

        /* THANH CHỌN THỨ */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 8px 14px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid #334155;
            background-color: #1e293b;
            color: #94a3b8;
            cursor: pointer;
            border-radius: 6px;
        }
        .tab-btn.active {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
        }

        /* KHU VỰC SƠ ĐỒ TOÀ NHÀ */
        .content-container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .building-block {
            background-color: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
            padding: 15px;
        }
        .building-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #334155;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .dot-30 { background-color: #ef4444; }
        .dot-58 { background-color: #fbbf24; }
        .dot-158 { background-color: #10b981; }
        .dot-237 { background-color: #a78bfa; }

        .floor-row {
            display: flex;
            flex-direction: column;
            border-bottom: 1px dashed #334155;
            padding: 12px 0;
            align-items: flex-start;
            gap: 8px;
        }
        .floor-row:last-child { border-bottom: none; }
        
        .floor-label {
            font-weight: bold;
            color: #3b82f6;
            font-size: 15px;
        }
        
        .floor-classes {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            width: 100%;
        }

        /* THẺ LỚP HỌC TRONG TẦNG */
        .class-card {
            background: #0f172a;
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #475569;
            position: relative;
            box-sizing: border-box;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .btn-delete {
            position: absolute;
            top: 10px;
            right: 12px;
            background: #273549;
            border: 1px solid #475569;
            color: #ef4444;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 10;
        }
        .btn-delete:hover {
            background-color: #ef4444;
            color: white;
            border-color: #ef4444;
        }

        /* DÒNG 1: CA HỌC VÀ SĨ SỐ */
        .card-row-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-right: 25px; /* Tránh đè lên nút Xóa */
        }
        .card-time { font-size: 11px; color: #3b82f6; font-weight: bold; }
        .badge-student { font-size: 11px; color: #e2e8f0; background: #334155; padding: 2px 6px; border-radius: 4px; }
        
        /* DÒNG 2: TÊN LỚP HỌC */
        .card-title-link { 
            font-size: 16px; 
            color: #f8fafc; 
            font-weight: bold; 
            text-decoration: underline;
            cursor: pointer;
            width: fit-content;
        }
        .card-title-link:hover { color: #3b82f6; }
        
        /* DÒNG 3: GIÁO VIÊN VÀ NÚT GỌI */
        .teacher-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 12px;
            color: #94a3b8;
        }
        .btn-call-prominent { 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background-color: #059669;
            color: white !important;
            text-decoration: none;
            font-weight: bold;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            box-shadow: 0 2px 4px rgba(5, 150, 105, 0.3);
            white-space: nowrap;
        }
        .btn-call-prominent:hover { background-color: #047857; }
        
        .empty-floor { color: #475569; font-style: italic; font-size: 12px; }

        @media (min-width: 768px) {
            body { padding: 20px; }
            h2 { font-size: 24px; }
            .floor-row { flex-direction: row; align-items: center; gap: 0; }
            .floor-label { width: 100px; flex-shrink: 0; }
            .floor-classes { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
            .tab-btn { padding: 12px 24px; font-size: 15px; border-radius: 8px; }
        }
    </style>
</head>
<body>

    <hr style="border: 1px solid #334155; max-width: 1300px; margin: 10px auto;">

    <h2>SƠ ĐỒ PHÂN TẦNG LỚP HỌC</h2>

    <div class="admin-panel">
        <div class="admin-title">🛠 Xếp lịch & phân tầng trực quan</div>
        <div class="form-grid">
            <div class="form-group">
                <label>Chọn Thứ</label>
                <select id="select-day">
                    <option value="thu2">Thứ 2</option><option value="thu3">Thứ 3</option><option value="thu4">Thứ 4</option>
                    <option value="thu5">Thứ 5</option><option value="thu6">Thứ 6</option><option value="thu7">Thứ 7</option><option value="cn">Chủ Nhật</option>
                </select>
            </div>
            <div class="form-group">
                <label>Ca Học</label>
                <select id="select-time">
                    <option value="18h00 - 19h30">Ca 18h00 - 19h30</option>
                    <option value="18h15 - 19h45">Ca 18h15 - 19h45</option>
                    <option value="18h30 - 20h00">Ca 18h30 - 20h00</option>
                    <option value="18h45 - 20h15">Ca 18h45 - 20h15</option>
                    <option value="20h00 - 21h30">Ca 20h00 - 21h30</option>
                </select>
            </div>
            <div class="form-group">
                <label>Sĩ số lớp</label>
                <input type="number" id="input-size" min="1" value="30">
            </div>
            <div class="form-group">
                <label>Lớp Học</label>
                <select id="select-class"></select>
            </div>

            <div class="form-group">
                <label>Giáo Viên</label>
                <select id="select-teacher"></select>
            </div>
            <div class="form-group">
                <label>Toà Nhà / Phòng</label>
                <select id="select-building">
                    <option value="T1-30">T1-30</option>
                    <option value="T2-30">T2-30</option>
                    <option value="T3-30">T3-30</option>
                    <option value="T1-158">T1-158</option>
                    <option value="T2-58">T2-58</option>
                    <option value="T3-58">T3-58</option>
                    <option value="T2-158">T2-158</option>
                    <option value="T3-158">T3-158</option>
                    <option value="T4-158">T4-158</option>
                    <option value="T2-237">T2-237</option>
                    <option value="T3-237">T3-237</option>
                    <option value="T4-237">T4-237</option>
                    <option value="T5-237">T5-237</option>
                    <option value="T6-237">T6-237</option>
                </select>
            </div>
            
            <div class="form-grid" style="grid-template-columns: 1fr 1fr; gap: 5px; width: 100%; padding: 0; margin: 0;">
                <div class="form-group">
                    <button class="btn-submit" onclick="addSchedule()">➕ Xếp Lịch</button>
                </div>
                <div class="form-group">
                    <button class="btn-clear-day" onclick="clearCurrentDaySchedule()">🗑 Xóa Ngày</button>
                </div>
            </div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="changeDay('thu2', this)">Thứ 2</button>
        <button class="tab-btn" onclick="changeDay('thu3', this)">Thứ 3</button>
        <button class="tab-btn" onclick="changeDay('thu4', this)">Thứ 4</button>
        <button class="tab-btn" onclick="changeDay('thu5', this)">Thứ 5</button>
        <button class="tab-btn" onclick="changeDay('thu6', this)">Thứ 6</button>
        <button class="tab-btn" onclick="changeDay('thu7', this)">Thứ 7</button>
        <button class="tab-btn" onclick="changeDay('cn', this)">Chủ Nhật</button>
    </div>

    <div class="content-container" id="building-container"></div>

    <script>
        // MẢNG GIÁO VIÊN
        const danhSachGiaoVien = [
            { name: " cô Phương", phone: "0901234567" },
            { name: "Lê Thu Hà ", phone: "0911222333" },
            { name: "Hồng Hạnh", phone: "0988777666" }
            { name: "P.Thanh", phone: "0901234567" },
            { name: "Thanh Thảo", phone: "0911222333" },
            { name: "Hà An", phone: "0988777666" }
        { name: "Mai Ly", phone: "0901234567" },
            { name: "Phương galaxy", phone: "0911222333" },
            { name: "Thu Phương quest", phone: "0988777666" }
        { name: "Ngô Hằng", phone: "0901234567" },
            { name: "Thu Hà 96", phone: "0911222333" },
            { name: "Tân", phone: "0988777666" }
        { name: "Trà My", phone: "0901234567" },
            { name: "Hà Linh", phone: "0911222333" },
            { name: "Tuệ Minh", phone: "0988777666" }
        { name: "Mạnh Toàn", phone: "0911222333" },
            { name: "Nhung", phone: "0988777666" }
        { name: "Minh Phương", phone: "0911222333" }
            
        ];

        // DANH SÁCH LỚP HỌC
        const danhSachLop = [
            // Các Lớp Khối 2
            { name: "Skykid", link: "https://hatbui10.github.io/skykid/" },
            { name: "Smartkid", link: "https://hatbui10.github.io/smartkid/" },
            { name: "Cloudkid", link: "https://hatbui10.github.io/cloudkid/" },

            // Các Lớp Khối 3
            { name: "Ozon", link: "https://hatbui10.github.io/ozon/" },
            { name: "Mickey", link: "https://hatbui10.github.io/mickey/" },

            // Các Lớp Khối 4
            { name: "Oxford4a", link: "https://hatbui10.github.io/oxford4a/" },
            { name: "Quest4", link: "https://hatbui10.github.io/quest/" },
            { name: "Cambridge", link: "https://hatbui10.github.io/cambridge/" },
            { name: "King", link: "https://hatbui10.github.io/king/" },
            { name: "Galaxy", link: "https://hatbui10.github.io/galaxy/" },

            // Các Lớp Khối 5
            { name: "Kind5", link: "https://hatbui10.github.io/kind5/" },
            { name: "Like5", link: "https://hatbui10.github.io/like5/" },
            { name: "Apolo", link: "https://hatbui10.github.io/apolo/" },

            // Các Lớp Khối 6
            { name: "Smile6", link: "https://hatbui10.github.io/smile6/" },
            { name: "Evic6", link: "https://hatbui10.github.io/evic6/" },
            { name: "Paris6", link: "https://hatbui10.github.io/paris6/" },
            { name: "Mar6", link: "https://hatbui10.github.io/mar6/" },
            { name: "Good6", link: "https://hatbui10.github.io/good6/" },
            { name: "Star6", link: "https://hatbui10.github.io/star6/" },

            // Các Lớp Khối 7
            { name: "Ila7", link: "https://hatbui10.github.io/ila7/" },
            { name: "Moon7", link: "https://hatbui10.github.io/moon7/" },
            { name: "Delta7", link: "https://hatbui10.github.io/delta7/" },
            { name: "Kid7", link: "https://hatbui10.github.io/kid7/" },
            { name: "Bossvip", link: "https://hatbui10.github.io/bossvip/" },

            // Các Lớp Khối 8
            { name: "Happy8", link: "https://hatbui10.github.io/happy8/" },
            { name: "High8", link: "https://hatbui10.github.io/high8/" },
            { name: "Hope8", link: "https://hatbui10.github.io/hope8/" },
            { name: "Sun8", link: "https://hatbui10.github.io/sun8/" },
            { name: "Supervip", link: "https://hatbui10.github.io/supervip/" },

            // Các Lớp Khối 9
            { name: "Sea9", link: "https://hatbui10.github.io/sea9/" },
            { name: "Big9", link: "https://hatbui10.github.io/big9/" },
            { name: "Clc9", link: "https://hatbui10.github.io/clc9/" },
            { name: "Super9", link: "https://hatbui10.github.io/super9/" },

            // Các Lớp Khối 10
            { name: "Cloud10", link: "https://hatbui10.github.io/cloud10/" },
            { name: "Win10", link: "https://hatbui10.github.io/win10/" },
            { name: "Try10", link: "https://hatbui10.github.io/try10/" },

            // Các Lớp Khối 11
            { name: "Can11", link: "https://hatbui10.github.io/can11/" },
            { name: "Ocean11", link: "https://hatbui10.github.io/ocean11/" },

            // Các Lớp Khối 12
            { name: "Ielt Wonderful 12", link: "https://hatbui10.github.io/ieltwonderful12/" },
            { name: "Athena12", link: "https://hatbui10.github.io/athena12/" }
        ];

        // Cấu trúc sơ đồ hiển thị theo cụm Toà Nhà tổng
        const cauTrucToaNha = { "30": 3, "58": 3, "158": 4, "237": 6 };
        const defaultSchedule = { thu2: [], thu3: [], thu4: [], thu5: [], thu6: [], thu7: [], cn: [] };
        let lichHocToanTruong = JSON.parse(localStorage.getItem('lichHocTang_V4')) || defaultSchedule;
        let currentDay = 'thu2';

        function initDropdowns() {
            const classSelect = document.getElementById('select-class');
            const teacherSelect = document.getElementById('select-teacher');

            classSelect.innerHTML = '';
            danhSachLop.forEach((lop, index) => { 
                classSelect.innerHTML += `<option value="${index}">${lop.name}</option>`; 
            });
            
            teacherSelect.innerHTML = '';
            danhSachGiaoVien.forEach(gv => {
                teacherSelect.innerHTML += `<option value="${gv.name}" data-phone="${gv.phone}">${gv.name}</option>`;
            });
        }

        function renderBuildingMap(day) {
            const container = document.getElementById('building-container');
            container.innerHTML = '';

            const listClasses = lichHocToanTruong[day] || [];

            Object.keys(cauTrucToaNha).forEach(toa => {
                let buildingHTML = `
                    <div class="building-block">
                        <div class="building-header"><span class="dot dot-${toa}"></span> NHÀ ${toa}</div>
                `;

                const tongSoTang = cauTrucToaNha[toa];
                for (let tang = tongSoTang; tang >= 1; tang--) {
                    buildingHTML += `
                        <div class="floor-row">
                            <div class="floor-label">Tầng ${tang}</div>
                            <div class="floor-classes" id="classes-${toa}-${tang}">
                    `;

                    const lopTrongTang = listClasses.filter(c => c.building === toa && parseInt(c.floor) === tang);

                    if (lopTrongTang.length === 0) {
                        buildingHTML += `<span class="empty-floor">Trống lịch học...</span>`;
                    } else {
                        lopTrongTang.forEach(item => {
                            const originIndex = listClasses.findIndex(c => c === item);
                            const phoneDisplay = item.gvPhone ? item.gvPhone.replace(/(\d{4})(\d{3})(\d{3})/, "$1.$2.$3") : "";
                            
                            let targetLink = item.lopLink;
                            if (!targetLink) {
                                const found = danhSachLop.find(l => l.name === item.lopName);
                                targetLink = found ? found.link : "#";
                            }

                            buildingHTML += `
                                <div class="class-card">
                                    <button class="btn-delete" title="Xóa lịch" onclick="deleteCard('${day}', ${originIndex})">✕</button>
                                    
                                    <div class="card-row-top">
                                        <div class="card-time">⏱ Ca: ${item.time}</div>
                                        <span class="badge-student">👥 Sĩ số: ${item.studentSize}</span>
                                    </div>
                                    
                                    <a href="${targetLink}" target="_blank" class="card-title-link">${item.lopName}</a>
                                    
                                    <div class="teacher-row">
                                        <span>👤 GV: ${item.gvName}</span>
                                        <a href="tel:${item.gvPhone}" class="btn-call-prominent">📞 Gọi ngay: ${phoneDisplay}</a>
                                    </div>
                                </div>
                            `;
                        });
                    }

                    buildingHTML += `</div></div>`;
                }

                buildingHTML += `</div>`;
                container.innerHTML += buildingHTML;
            });
        }

        function addSchedule() {
            const targetDay = document.getElementById('select-day').value;
            const time = document.getElementById('select-time').value;
            const lopIndex = document.getElementById('select-class').value;
            const lopName = danhSachLop[lopIndex].name;
            const lopLink = danhSachLop[lopIndex].link;
            const studentSize = document.getElementById('input-size').value || "0";
            const teacherSelect = document.getElementById('select-teacher');
            const gvName = teacherSelect.value;
            const gvPhone = teacherSelect.options[teacherSelect.selectedIndex].getAttribute('data-phone');
            
            // Xử lý bóc tách tự động Tầng và Toà nhà từ chuỗi dạng "T1-30", "T3-158"
            const buildingValue = document.getElementById('select-building').value; // Ví dụ: "T2-158"
            const parts = buildingValue.split('-'); // Cắt thành ["T2", "158"]
            
            const floor = parts[0].replace('T', ''); // Lấy số tầng "2"
            const building = parts[1]; // Lấy khu toà nhà "158"

            lichHocToanTruong[targetDay].push({ time, lopName, lopLink, studentSize, gvName, gvPhone, building, floor });
            localStorage.setItem('lichHocTang_V4', JSON.stringify(lichHocToanTruong));
            renderBuildingMap(currentDay);
            alert("Đã xếp lịch thành công!");
        }

        function deleteCard(day, index) {
            if (confirm("Bạn muốn xóa lớp học này?")) {
                lichHocToanTruong[day].splice(index, 1);
                localStorage.setItem('lichHocTang_V4', JSON.stringify(lichHocToanTruong));
                renderBuildingMap(day);
            }
        }

        function clearCurrentDaySchedule() {
            const dayText = document.querySelector('.tab-btn.active').innerText;
            if (confirm(`Bạn có chắc chắn muốn xóa lịch của ${dayText}?`)) {
                lichHocToanTruong[currentDay] = [];
                localStorage.setItem('lichHocTang_V4', JSON.stringify(lichHocToanTruong));
                renderBuildingMap(currentDay);
            }
        }

        function changeDay(dayId, buttonEl) {
            currentDay = dayId;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            buttonEl.classList.add('active');
            renderBuildingMap(dayId);
        }

        window.onload = function() {
            initDropdowns();
            renderBuildingMap('thu2');
        };
    </script>
</body>
</html>
