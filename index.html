function googleLogin() {
    firebase.auth().signInWithPopup(provider)
    .then((result) => {
        const user = result.user;
        const userEmail = user.email;

        // Kiểm tra trong Firestore xem email này có phải là Admin không
        db.collection("settings").doc("admin_list").get()
        .then((doc) => {
            if (doc.exists) {
                const adminEmails = doc.data().emails;
                
                if (adminEmails.includes(userEmail)) {
                    isAdminUnlocked = true;
                    document.getElementById('admin-panel-box').style.display = 'block';
                    alert("Đăng nhập thành công! Chào Admin.");
                } else {
                    alert("Bạn đăng nhập thành công, nhưng không có quyền quản trị!");
                    firebase.auth().signOut();
                }
            } else {
                alert("Chưa thiết lập danh sách Admin trên hệ thống.");
            }
        });
    })
    .catch((error) => {
        console.error("Lỗi:", error);
    });
}

        danhSachGiaoVien.forEach(gv => {
            teacherSelect.innerHTML += `<option value="${gv.name}" data-phone="${gv.phone}">${gv.name}</option>`;
        });
    }

    // HÀM RENDER ĐÃ BỎ HOÀN TOÀN KHỐI TOÀ NHÀ TRUNG GIAN
    function renderScheduleList(day) {
        const container = document.getElementById('schedule-container');
        container.innerHTML = '';

        const listClasses = lichHocToanTruong[day] || [];

        if (listClasses.length === 0) {
            container.innerHTML = `<div class="empty-schedule">Không có lịch học nào được xếp trong ngày này.</div>`;
            return;
        }

        // Duyệt trực tiếp qua mảng và render thẳng ra danh sách thẻ lớp học
        listClasses.forEach((item, index) => {
            const phoneDisplay = item.gvPhone ? item.gvPhone.replace(/(\d{4})(\d{3})(\d{3})/, "$1.$2.$3") : "";
            
            let targetLink = item.lopLink;
            if (!targetLink) {
                const found = danhSachLop.find(l => l.name === item.lopName);
                targetLink = found ? found.link : "#";
            }

            const deleteBtnStyle = isAdminUnlocked ? "display: flex;" : "display: none;";

            container.innerHTML += `
                <div class="class-card">
                    <button class="btn-delete" style="${deleteBtnStyle}" title="Xóa lịch" onclick="deleteCard('${day}', ${index})">✕</button>
                    
                    <!-- 1. TÊN LỚP -->
                    <div class="class-name-container">
                        <a href="${targetLink}" target="_blank" class="class-name">${item.lopName}</a>
                    </div>
                    
                    <!-- 2. PHÒNG HỌC -->
                    <div class="info-row">
                        <div class="info-left-group">
                            <span class="info-label">Phòng học:</span>
                            <span class="info-value"> Tầng ${item.floor} - Nhà ${item.building}</span>
                        </div>
                        <span style="font-size: 11px; color: #64748b; background: #273549; padding: 2px 6px; border-radius: 4px;" hidden>👥 Sĩ số: ${item.studentSize}</span>
                    </div>
                        <!-- 3. GIÁO VIÊN + NÚT GỌI -->
                    <div class="info-row">
                        <div class="info-left-group">
                            <span class="info-label">Giáo viên:</span>
                            <span class="info-value">${item.gvName}</span>
                        </div>
                        <a href="tel:${item.gvPhone}" class="btn-call-prominent">📞 Gọi</a>
                    </div>
                    
                    <!-- 4. THỜI GIAN HỌC -->
                    <div class="info-row">
                        <div class="info-left-group">
                            <span class="info-label">Thời gian:</span>
                            <span class="info-value info-time">${item.time}</span>
                        </div>
                    </div>
                </div>
            `;
        });
    }

// 3. Hàm đồng bộ lên Firebase
function syncToFirebase(data) {
    db.collection("data").doc("lichHoc").set({ content: data })
    .then(() => {
        console.log("✅ Đã đồng bộ thành công lên Firebase!");
    })
    .catch((error) => {
        console.error("❌ Lỗi đồng bộ Firebase:", error);
        alert("Có lỗi xảy ra khi lưu lên máy chủ: " + error.message);
    });
}

// 4. Các hàm xử lý giao diện của bạn (giữ nguyên logic cũ)
function addSchedule() {
    if (!isAdminUnlocked) return alert("Bạn cần đăng nhập bằng mật khẩu trước!");
    const targetDay = document.getElementById('select-day').value;
    const time = document.getElementById('select-time').value;
    const lopIndex = document.getElementById('select-class').value;
    const lopName = danhSachLop[lopIndex].name;
    const lopLink = danhSachLop[lopIndex].link;
    const studentSize = document.getElementById('input-size').value || "0";
    const teacherSelect = document.getElementById('select-teacher');
    const gvName = teacherSelect.value;
    const gvPhone = teacherSelect.options[teacherSelect.selectedIndex].getAttribute('data-phone');
    const buildingValue = document.getElementById('select-building').value; 
    const parts = buildingValue.split('-'); 
    const floor = parts[0].replace('T', ''); 
    const building = parts[1]; 

    lichHocToanTruong[targetDay].push({ time, lopName, lopLink, studentSize, gvName, gvPhone, building, floor });
    localStorage.setItem('lichHocTang_V4', JSON.stringify(lichHocToanTruong));
    syncToFirebase(lichHocToanTruong);
    renderScheduleList(currentDay);
    alert("Đã xếp lịch thành công!");
}

 function changeDay(dayId, buttonEl) {
        currentDay = dayId;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        buttonEl.classList.add('active');

        renderScheduleList(dayId);
    }
function deleteCard(day, index) {
    if (!isAdminUnlocked) return alert("Bạn không có quyền thực hiện chức năng này!");
    if (confirm("Bạn muốn xóa lớp học này?")) {
        lichHocToanTruong[day].splice(index, 1);
        localStorage.setItem('lichHocTang_V4', JSON.stringify(lichHocToanTruong));
        syncToFirebase(lichHocToanTruong);
        renderScheduleList(day);
    }
}

function clearCurrentDaySchedule() {
    if (!isAdminUnlocked) return alert("Bạn không có quyền thực hiện chức năng này!");
    if (confirm(`Bạn có chắc chắn muốn xóa lịch của ngày này?`)) {
        lichHocToanTruong[currentDay] = [];
        localStorage.setItem('lichHocTang_V4', JSON.stringify(lichHocToanTruong));
        syncToFirebase(lichHocToanTruong);
        renderScheduleList(currentDay);
    }
}

// 5. Chạy khi trang tải xong
window.onload = function() {
    initDropdowns();
    
    // Tải dữ liệu từ Firebase
    db.collection("data").doc("lichHoc").get().then((doc) => {
        if (doc.exists) {
            lichHocToanTruong = doc.data().content;
            localStorage.setItem('lichHocTang_V4', JSON.stringify(lichHocToanTruong));
            renderScheduleList('thu2');
        } else {
            renderScheduleList('thu2');
        }
    }).catch(err => {
        console.error("Lỗi tải dữ liệu:", err);
        renderScheduleList('thu2');
    });
};
