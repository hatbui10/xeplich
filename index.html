        * {
            box-sizing: border-box;
        }
        body {

            margin: 0;
            padding: 10px;
            color: #cbd5e1;
        }
        h2 {
            text-align: center;
            color: #f8fafc;
            margin: 15px 0;
            text-transform: uppercase;
            font-size: 20px;
        }

        .container-wrapper {

            margin-left: 3px;
            margin-right: 3px;
        }

        .password-trigger-container {
            max-width: 1300px;
            margin: 0 auto 15px auto;
            text-align: right;
        }
        .btn-unlock {
            background-color: #1e293b;
            color: #3b82f6;
            border: 1px solid #334155;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn-unlock:hover {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        /* BỘ CÔNG CỤ XẾP LỊCH - MẶC ĐỊNH ẨN */
        .admin-panel {
            display: none;
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 15px;
            max-width: 1300px;
            margin: 0 auto 20px auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .admin-title {
            font-size: 14px;
            font-weight: bold;
            color: #3b82f6;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            align-items: flex-end;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group label {
            font-size: 12px;
            color: #94a3b8;
        }
        .form-group select, .form-group input {
            background-color: #0f172a;
            border: 1px solid #475569;
            color: #f8fafc;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            width: 100%;
        }
        .btn-submit {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            width: 100%;
        }
        .btn-submit:hover { background-color: #2563eb; }
        
        .btn-clear-day {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            width: 100%;
        }
        .btn-clear-day:hover { background-color: #dc2626; }

        /* THANH CHỌN THỨ */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 8px 14px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid #334155;
            background-color: #1e293b;
            color: #94a3b8;
            cursor: pointer;
            border-radius: 6px;
        }
        .tab-btn.active {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
        }

        /* KHU VỰC CHỨA DANH SÁCH THẺ TRỰC TIẾP */
        .schedule-list-grid {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            width: 100%;
        }

        /* ĐỊNH DẠNG THẺ LỚP HỌC */
        .class-card {
            background: #161822;
            border-left: 4px solid #ff007f;
            border-radius: 6px;
            padding: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.15);
            position: relative;
            width: 100%;
            animation: fadeIn 0.3s ease-in-out;
        }
        
        .btn-delete {
            display: none; 
            position: absolute;
            top: 12px;
            right: 12px;
            background: #273549;
            border: 1px solid #475569;
            color: #ef4444;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            width: 22px;
            height: 22px;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 10;
        }
        .btn-delete:hover {
            background-color: #ef4444;
            color: white;
            border-color: #ef4444;
        }

        /* DÒNG 1: TÊN LỚP */
        .class-name-container {
            margin-bottom: 10px;
            padding-right: 25px;
        }
        .class-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            text-decoration: underline;
        }
        .class-name:hover {
            color: #00f2fe;
        }

        /* CÁC DÒNG THÔNG TIN NỘI DUNG THẺ */
        .info-row {
            font-size: 0.9rem;
            color: #cbd5e1;
            margin: 6px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 5px;
        }

        .info-left-group {
            display: flex;
            align-items: center;
        }

        .info-label {
            color: #64748b;
            min-width: 90px;
            display: inline-block;
        }

        .info-value {
            color: #f8fafc;
        }

        .info-time {
            color: #ffbd59;
            font-weight: 600;
        }

        /* NÚT GỌI ĐIỆN */
        .btn-call-prominent { 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background-color: #059669;
            color: white !important;
            text-decoration: none;
            font-weight: bold;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            box-shadow: 0 2px 4px rgba(5, 150, 105, 0.3);

        }

        .empty-schedule { 
            text-align: center;
            color: #475569; 
            font-style: italic; 
            font-size: 14px; 
            padding: 30px 0; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        }
    </style>
</head>

// 3. Hàm đồng bộ lên Firebase
function syncToFirebase(data) {
    db.collection("data").doc("lichHoc").set({ content: data })
    .then(() => {
        console.log("✅ Đã đồng bộ thành công lên Firebase!");
    })
    .catch((error) => {
        console.error("❌ Lỗi đồng bộ Firebase:", error);
        alert("Có lỗi xảy ra khi lưu lên máy chủ: " + error.message);

}

    const floor = parts[0].replace('T', ''); 
    const building = parts[1]; 

    lichHocToanTruong[targetDay].push({ time, lopName, lopLink, studentSize, gvName, gvPhone, building, floor });
    localStorage.setItem('lichHocTang_V4', JSON.stringify(lichHocToanTruong));
    syncToFirebase(lichHocToanTruong);
    renderScheduleList(currentDay);
    alert("Đã xếp lịch thành công!");
}

 function changeDay(dayId, buttonEl) {
        currentDay = dayId;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        buttonEl.classList.add('active');
syncToFirebase(lichHocToanTruong);
        renderScheduleList(dayId);
    }
function deleteCard(day, index) {
    if (!isAdminUnlocked) return alert("Bạn không có quyền thực hiện chức năng này!");
    if (confirm("Bạn muốn xóa lớp học này?")) {
        lichHocToanTruong[day].splice(index, 1);
        localStorage.setItem('lichHocTang_V4', JSON.stringify(lichHocToanTruong));
        syncToFirebase(lichHocToanTruong);
        renderScheduleList(day);
    }
}

function clearCurrentDaySchedule() {
    if (!isAdminUnlocked) return alert("Bạn không có quyền thực hiện chức năng này!");
    if (confirm(`Bạn có chắc chắn muốn xóa lịch của ngày này?`)) {
        lichHocToanTruong[currentDay] = [];
        localStorage.setItem('lichHocTang_V4', JSON.stringify(lichHocToanTruong));
        syncToFirebase(lichHocToanTruong);
        renderScheduleList(currentDay);
    }
}

// 5. Chạy khi trang tải xong
window.onload = function() {
    initDropdowns();
    
    // Tải dữ liệu từ Firebase
    db.collection("data").doc("lichHoc").get().then((doc) => {
        if (doc.exists) {
            lichHocToanTruong = doc.data().content;
            localStorage.setItem('lichHocTang_V4', JSON.stringify(lichHocToanTruong));
            renderScheduleList('thu2');
        } else {
            renderScheduleList('thu2');
        }
    }).catch(err => {
        console.error("Lỗi tải dữ liệu:", err);
        renderScheduleList('thu2');
    });
};
